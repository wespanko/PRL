# Render Blueprint — one-click deploy of the Panko backend.
# After pushing this repo to GitHub, in Render: New → Blueprint → connect repo.
# Render will read this file and create the service automatically.

services:
  - type: web
    name: panko-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # set in Render dashboard, never committed
      - key: PANKO_ALLOWED_ORIGINS
        sync: false   # set after Vercel deploy: https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.12"
