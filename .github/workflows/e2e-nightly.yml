name: E2E (nightly)

# Runs the tutor-flow smoke test against the live Vercel deploy once a night
# (and on manual dispatch). If this fails, prod is broken — see
# frontend/e2e/tutor-flow.spec.js.

on:
  schedule:
    - cron: "30 7 * * *"   # 07:30 UTC nightly
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E against production
        env:
          PANKO_E2E_URL: https://prl-seven.vercel.app
        run: npm run e2e

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: frontend/test-results/
          retention-days: 7
